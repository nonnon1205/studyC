name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies (C tools)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cppcheck clang-tidy bear

    - name: Set up Python (for E2E tests)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: 'tests/requirements.txt'

    - name: Build project
      run: bear -- make all

    - name: Static Analysis (cppcheck)
      run: |
        cppcheck --enable=warning,style --std=c11 -ICommon/include -ISHM/include -IMgmt/include Collector/src Router/src Viewer/src MgmtCtl/src

    - name: Static Analysis (clang-tidy)
      run: bash run_clang_tidy.sh

    - name: Run E2E Tests (Normal Build)
      run: make test

    - name: Run E2E Tests (ASan + UBSan)
      run: make test-asan

    - name: Run E2E Tests (TSan)
      run: make test-tsan