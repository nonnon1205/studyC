name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies (C tools)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cppcheck clang-tidy

    - name: Set up Python (for E2E tests)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: 'tests/requirements.txt'

    - name: Build project
      run: |
        make all
        make debug

    - name: Static Analysis (cppcheck)
      run: |
        cppcheck --enable=warning,style --std=c11 -ICommon/include -ISHM/include -IMgmt/include Collector/src Router/src Viewer/src MgmtCtl/src

    - name: Static Analysis (clang-tidy)
      run: bash run_clang_tidy.sh

    - name: Run E2E Tests
      run: make test